# ============================================================
# PARENT REPO — .github/workflows/sync-subtree.yml
#
# Triggered when a programme repo merges to main.
# Checks programme-repos.txt to verify the repo is registered,
# then adds the subtree (first time) or pulls latest (ongoing).
#
# To register a new programme repo:
#   1. Add it to programme-repos.txt
#   2. Actions → "Sync programme subtree" → Run workflow → enter repo name
#      (this bootstraps it; all future pushes from that repo are automatic)
#
# To add/remove repos going forward, only edit programme-repos.txt.
# ============================================================

name: Sync programme subtree

on:
  repository_dispatch:
    types: [programme-repo-updated]
  workflow_dispatch:
    inputs:
      repo:
        description: "Full repo name to sync (e.g. acme-corp/payroll-system)"
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout parent repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGGREGATOR_PAT }}
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve repo and subfolder
        id: resolve
        run: |
          FULL_REPO="${{ github.event.client_payload.repo || github.event.inputs.repo }}"
          REPO_NAME="${FULL_REPO##*/}"
          echo "full_repo=${FULL_REPO}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "subfolder=children/${REPO_NAME}" >> $GITHUB_OUTPUT

      # Prevents arbitrary repos from writing into the parent
      - name: Check repo is registered in programme-repos.txt
        run: |
          FULL_REPO="${{ steps.resolve.outputs.full_repo }}"
          if grep -qxF "${FULL_REPO}" programme-repos.txt; then
            echo "${FULL_REPO} is registered"
          else
            echo "${FULL_REPO} is not listed in programme-repos.txt — skipping."
            echo "   Add it to programme-repos.txt then re-run this workflow."
            exit 1
          fi

      # First push from a new repo: runs git subtree add
      # All subsequent pushes: runs git subtree pull
      - name: Add or update subtree
        env:
          GH_TOKEN: ${{ secrets.AGGREGATOR_PAT }}
          FULL_REPO: ${{ steps.resolve.outputs.full_repo }}
          SUBFOLDER: ${{ steps.resolve.outputs.subfolder }}
        run: |
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${FULL_REPO}.git"
          MSG="chore: sync ${SUBFOLDER} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          if [ -d "${SUBFOLDER}" ]; then
            echo "Subtree exists — pulling latest changes"
            git subtree pull --prefix="${SUBFOLDER}" "${REMOTE_URL}" main --squash -m "${MSG}"
          else
            echo "First time — adding subtree"
            git subtree add --prefix="${SUBFOLDER}" "${REMOTE_URL}" main --squash -m "${MSG}"
          fi

      - name: Remove unwanted files from subtree
        env:
          SUBFOLDER: ${{ steps.resolve.outputs.subfolder }}
        run: |
          rm -f "${SUBFOLDER}/README.md"
          rm -f "${SUBFOLDER}/package.json"
          rm -f "${SUBFOLDER}/package-lock.json"
          rm -f "${SUBFOLDER}/options.json"
          # Add any other files to exclude here
          
      - name: Push to parent repo
        env:
          GH_TOKEN: ${{ secrets.AGGREGATOR_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin main
